<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Simple Task Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-white"> <!-- Light mode by default -->

    <nav class="navbar navbar-dark bg-black mb-4"> <!-- Dark navbar for contrast -->
      <div class="container">
        <span class="navbar-brand fw-bold">Your Simple Task Tracker</span>
      </div>
    </nav>

    <div class="container" style="max-width: 640px;">

      <!-- success/error toast -->
      <div id="toast" class="toast-msg hidden"></div>

      <!-- Add Task -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">Add Task</h5>
          <form id="add-form" class="d-flex gap-2">
            <input
              type="text"
              id="task-title"
              class="form-control"
              placeholder="What you are up to..."
              maxlength="200"
            />
            <button type="submit" class="btn btn-primary px-4">Add New</button>
          </form>
          <p id="form-error" class="text-danger small mt-2 mb-0"></p>
        </div>
      </div>

      <!-- Task List -->
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3">Your Current Tasks</h5>

          <!-- filter buttons - All / Active / Completed -->
          <div class="btn-group mb-3" id="filter-buttons">
            <button class="btn btn-sm btn-dark active" data-filter="all">All</button>
            <button class="btn btn-sm btn-outline-dark" data-filter="active">Active</button>
            <button class="btn btn-sm btn-outline-dark" data-filter="completed">Completed</button>
          </div>

          <p id="empty-msg" class="text-muted fst-italic">No tasks yet.</p>
          <ul id="task-list" class="list-group list-group-flush"></ul>
        </div>
      </div>

    </div>

    <!-- Edit Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="card modal-box shadow">
        <div class="card-body">
          <h5 class="mb-3">Edit Task</h5>
          <input type="text" id="edit-title" class="form-control" maxlength="200" />
          <p id="edit-error" class="text-danger small mt-2 mb-0"></p>
          <div class="d-flex gap-2 mt-3">
            <button id="save-btn" class="btn btn-primary">Save changes</button>
            <button id="cancel-btn" class="btn btn-outline-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
