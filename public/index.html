<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <span class="navbar-brand">Task Tracker</span>
      </div>
    </nav>

    <div class="container">

      <!-- Add Task -->
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title">Add New Task</h5>
          <form id="add-form" class="d-flex gap-2">
            <input
              type="text"
              id="task-title"
              class="form-control"
              placeholder="Enter task title..."
              maxlength="200"
            />
            <button type="submit" class="btn btn-primary">Add</button>
          </form>
          <p id="form-error" class="text-danger small mt-1 mb-0"></p>
        </div>
      </div>

      <!-- Task List -->
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Tasks</h5>
          <p id="empty-msg" class="text-muted">No tasks yet. Add one above!</p>
          <ul id="task-list" class="list-group list-group-flush"></ul>
        </div>
      </div>

    </div>

    <!-- Edit Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <h5>Edit Task</h5>
        <input type="text" id="edit-title" class="form-control mt-2" maxlength="200" />
        <p id="edit-error" class="text-danger small mt-1 mb-0"></p>
        <div class="d-flex gap-2 mt-3">
          <button id="save-btn" class="btn btn-primary">Save</button>
          <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
